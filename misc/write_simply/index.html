<!DOCTYPE html>
<html>
<head>
<style>
*, *::before, *::after {
  box-sizing: border-box;
}

body {
  background-color: #f0f0f0;
}

textarea {
  width: 8.5in;
}

.container {
  background-color:#222;
}

.highlights, textarea {
  padding: 0.75in;
  font: 12pt/24pt 'Times New Roman', serif;
  letter-spacing: 1px;
}

.container {
  display: block;
  margin: 0 auto;
  transform: translateZ(0);
  -webkit-text-size-adjust: none;
  width:8.5in;
}

.backdrop {
  position: absolute;
  z-index: 1;
  border: 2px solid transparent;
  background-color: transparent;
  overflow: none;
  pointer-events: none;
  transition: transform 1s;
  background: white;
}

.highlights {
	white-space: pre-wrap;
	word-wrap: break-word;
	color: transparent;
}

textarea {
  display: block;
  position: absolute;
  z-index: 2;
  margin: 0;
  border: 2px solid #74637f;
  border-radius: 0;
  color: #444;
  background-color: transparent;
  overflow: auto;
  resize: none;
  transition: transform 1s;
  _min-height: 11in;
}

.misspelled {
  border-radius: 3px;
  background-color: #eee;

  color: transparent;

  /* instead */
  line-height:90%;
  display: inline-block;
  border-bottom: 3px red solid;
}

.toomanysyllables {
  border-radius: 3px;
  background-color: #eee;

  color: transparent;

  /* instead */
  line-height:90%;
  display: inline-block;
  border-bottom: 3px skyblue solid;
}

textarea:focus, button:focus {
  outline: none;
  box-shadow: 0 0 0 2px #c6aada;
}
</style>
<style>
@page {
	size: 8.5in 11in;
}

@media print {
	.highlights { display: none; }
	body { background: none; margin: 0; padding: 0; }
}
</style>
</head>
<body>
<p>Current syntax highlighting mode: underline words with more than two syllables.</p>
<div class="container">
	<div class="backdrop">
		<div class="highlights"></div>
	</div>
	<textarea spellcheck=false autofocus></textarea>
</div>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/autosize.js/3.0.18/autosize.js"></script>
<script>

var $container = $('.container');
var $backdrop = $('.backdrop');
var $highlights = $('.highlights');
var $textarea = $('textarea');
var $toggle = $('button');

// yeah, browser sniffing sucks, but there are browser-specific quirks to handle that are not a matter of feature detection
var ua = window.navigator.userAgent.toLowerCase();
var isIE = !!ua.match(/msie|trident\/7|edge/);
var isWinPhone = ua.indexOf('windows phone') !== -1;
var isIOS = !isWinPhone && !!ua.match(/ipad|iphone|ipod/);

function handleInput() {
  var text = $textarea.val();
  var highlightedText = applyHighlights(text);
  $highlights.html(highlightedText);
}

function handleResize() {
  $highlights.width($textarea.width()).height($textarea.height());
  handleInput();
}

function fixIOS() {
  // iOS adds 3px of (unremovable) padding to the left and right of a textarea, so adjust highlights div to match
  $highlights.css({
    'padding-left': '+=3px',
    'padding-right': '+=3px'
  });
}

function bindEvents() {
  autosize($textarea);

  $textarea.on({
    'input': handleInput,
    'autosize:resized': handleResize
  });

  $toggle.on('click', function() {
    $container.toggleClass('perspective');
  });
}

if (isIOS) {
  fixIOS();
}

bindEvents();
handleResize();

</script>
<script src="syllable-count-english.js"></script>
<script>
var simplewords = []
var myReq = new Request("68a59902e0b21e3d8d768cae17b603b3.json")
fetch(myReq).then((response) => response.json()).then((data) => {
  simplewords = data
  for (var i = 0; i < data.length; i++) {
    if (syllableCountForWord(data[i]) > 2) console.log(data[i])
  }
})
</script>
<script>
function applyHighlights(text) {
	var words = text.split(/([\n\?\!\,\s\.])/g).filter(x=>!(typeof x == 'undefined'))
	console.log(words)
	return words.map(x=>{
		if (['\n', '?', '!', ',', '.', ' ', '\t'].indexOf(x) >= 0) return x
		if (!isNaN(parseFloat(x))) return x
		num_syllables = syllableCountForWord(x)
		if (num_syllables > 2) {
            if (simplewords.indexOf(x.toLowerCase()) != -1) return x
			return '<span class="toomanysyllables">' + x + '</span>'
		} else if (num_syllables == -1) {
            //if (x.split('-').map(z=>syllableCountForWord(z)).filter(z=>z==-1).length == 0) {
            if (x.split('-').map(z=>simplewords.indexOf(z)).filter(z=>z==-1).length == 0) {
              return x
            } else {
              return '<span class="misspelled">' + x + '</span>'
            }
		}
		return x
	}).join('')
}
function iambicHighlights(text) {
	var lines = text.split('\n')
	for (line in lines) {
		var words = lines[line].split(/([\n\?\!\,\s\.])/g).filter(x=>!(typeof x == 'undefined'))
		var syllable_count = 0
		for (var i = 0; i < words.length; i++) {
			if (['\n', '?', '!', ',', '.', ' ', '\t'].indexOf(words[i]) >= 0) continue
			var stress = getStressForWord(words[i])
			if (stress == -1) {
				words[i] = '<span class="misspelled">' + words[i] + '</span>'
			} else {
				syllable_count += stress.length
			}
			if (syllable_count > 10) {
				words[i] = '<span class="toomanysyllables">' + words[i] + '</span>'
			}
		}

		lines[line] = words.join('')
	}
	return lines.join('\n')
}
</script>
</body>
</html>
